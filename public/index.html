<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Primary Meta Tags -->
    <title>Zach Drummond | Full Stack Web Developer</title>
    <meta name="title" content="Zach Drummond | Full Stack Web Developer" />
    <meta name="author" content="Zach Drummond" />
    <meta
      name="description"
      content="My responsive portfolio that includes my projects and a place to contact me."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://zachdrummond.com/" />
    <meta property="og:title" content="Zach Drummond" />
    <meta
      property="og:description"
      content="My responsive portfolio that includes my projects and a place to contact me."
    />
    <meta property="og:image" content="./images/" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://zachdrummond.com/" />
    <meta property="twitter:title" content="Zach Drummond" />
    <meta
      property="twitter:description"
      content="My responsive portfolio that includes my projects and a place to contact me."
    />
    <meta property="twitter:image" content="./images/" />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
